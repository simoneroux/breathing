<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Indigo rounded-square background -->
  <rect width="32" height="32" rx="7" fill="#3f51b5"/>

  <!--
    Lotus flower — 5 petals fanning from a shared base at (16, 26).

    Petal local path (base at origin, pointing straight up 18 px):
      M 0 0  C -4 -7  -3 -15  0 -18  C  3 -15  4 -7  0 0

    Each petal uses:  transform="translate(16,26) rotate(angle)"
    Outer petals are scaled to 80 % height so they sit lower & wider,
    matching a real lotus silhouette.
    Drawn back → front so the centre petal is always on top.
  -->

  <!-- Outer petals  (behind, 80 % height, 40 % opacity) -->
  <path fill="rgba(255,255,255,0.40)"
        transform="translate(16,26) rotate(-55) scale(1,0.8)"
        d="M0 0C-4-7-3-15 0-18C3-15 4-7 0 0"/>
  <path fill="rgba(255,255,255,0.40)"
        transform="translate(16,26) rotate(55) scale(1,0.8)"
        d="M0 0C-4-7-3-15 0-18C3-15 4-7 0 0"/>

  <!-- Inner side petals  (68 % opacity) -->
  <path fill="rgba(255,255,255,0.68)"
        transform="translate(16,26) rotate(-27)"
        d="M0 0C-4-7-3-15 0-18C3-15 4-7 0 0"/>
  <path fill="rgba(255,255,255,0.68)"
        transform="translate(16,26) rotate(27)"
        d="M0 0C-4-7-3-15 0-18C3-15 4-7 0 0"/>

  <!-- Centre petal  (full white, on top) -->
  <path fill="white"
        transform="translate(16,26)"
        d="M0 0C-4-7-3-15 0-18C3-15 4-7 0 0"/>
</svg>
