<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#3f51b5">
  <title>Breathe</title>
  <!-- Favicon & homescreen icon -->
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-a: #5c6bc0;
      --bg-b: #3f51b5;
      --hold-a: #303f9f;
      --hold-b: #1a237e;
      --duration: 5s;
    }

    /* html carries the gradient — covers the ENTIRE screen including safe-areas.
       overflow:hidden + overscroll-behavior:none together kill the iOS
       rubber-band bounce that used to reveal a white document background.   */
    html {
      height: 100%;
      min-height: -webkit-fill-available;
      background: linear-gradient(135deg, var(--bg-a), var(--bg-b));
      transition: background 1.5s ease-in-out;
      overflow: hidden;             /* lock elastic scroll at the root */
    }
    html.hold { background: linear-gradient(135deg, var(--hold-a), var(--hold-b)); }

    body {
      min-height: 100dvh;
      min-height: -webkit-fill-available;
      overflow: hidden;             /* no scroll, no bounce */
      overscroll-behavior: none;    /* belt-and-suspenders: kills iOS rubber-band */
      touch-action: manipulation;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: clamp(1.5rem, 4vh, 3rem) 1.5rem;
      padding-bottom: max(env(safe-area-inset-bottom), clamp(1.5rem, 4vh, 3rem));
      background: linear-gradient(135deg, var(--bg-a), var(--bg-b));
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: white;
      transition: background 1.5s ease-in-out;
    }
    body.hold { background: linear-gradient(135deg, var(--hold-a), var(--hold-b)); }

    /* ── Card ──────────────────────────────────────────────────────────────
       Mobile: glass pill that contains everything.
       Desktop (≥ 640 px): card shell dissolves — the viz expands freely.   */
    .card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: clamp(0.9rem, 2.5vw, 1.5rem);
      padding: clamp(2rem, 5vw, 3rem) clamp(1.5rem, 4vw, 2.5rem);
      border-radius: 32px;
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.18);
      width: min(440px, 92vw);
      text-align: center;
      user-select: none;
    }

    @media (min-width: 640px) {
      .card {
        background: none;
        border: none;
        backdrop-filter: none;
        -webkit-backdrop-filter: none;
        box-shadow: none;
        padding: 0;
        width: auto;
        gap: clamp(1.4rem, 3vh, 2.5rem);
      }
    }

    /* ── Typography ────────────────────────────────────────────────────── */
    h1 {
      font-size: clamp(1.8rem, 4vw, 3rem);
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .subtitle {
      font-size: clamp(0.85rem, 1.8vw, 1.05rem);
      opacity: 0.65;
    }

    /* ── Breathing visual ──────────────────────────────────────────────────
       55 vmin means: ~500 px on a 13" laptop (900 px tall),
       ~260 px on a phone held portrait (min-clamp kicks in for tiny screens).
       The circle and dot are sized as % of the breather so ratios
       stay identical at every viewport size.                                */
    .breather {
      position: relative;
      width:  clamp(260px, 55vmin, 520px);
      height: clamp(260px, 55vmin, 520px);
      display: flex;
      align-items: center;
      justify-content: center;
      /* give the expanding circle room to breathe without clipping */
      overflow: visible;
    }

    .square {
      position: absolute;
      inset: 0;
      border: 1.5px solid rgba(255, 255, 255, 0.28);
      border-radius: 4px;
    }

    /* Dot scales with vmin so it stays crisp on every screen size */
    .dot {
      --ds: clamp(11px, 2.2vmin, 18px);
      position: absolute;
      width:  var(--ds);
      height: var(--ds);
      background: white;
      border-radius: 50%;
      box-shadow: 0 0 12px rgba(255, 255, 255, 0.9);
      top:  calc(var(--ds) / -2);
      left: calc(var(--ds) / -2);
      offset-path: rect(0% 100% 100% 0% round 4px);
      will-change: offset-distance;
    }

    .dot.running {
      animation: follow calc(var(--duration) * 4) linear infinite;
    }

    @keyframes follow {
      from { offset-distance:   0%; }
      to   { offset-distance: 100%; }
    }

    /* Circle is 44 % of the breather — proportional at every size.
       scale(2.15) on inhale takes it to ~94 % of the box (same visual
       ratio as the original design at 210 px).                             */
    .circle {
      width:  44%;
      height: 44%;
      background: rgba(255, 255, 255, 0.25);
      border-radius: 50%;
      transition: transform var(--duration) cubic-bezier(0.4, 0, 0.2, 1),
                  background 1.5s ease;
      will-change: transform;
    }
    .circle.hold { background: rgba(26, 35, 126, 0.55); }

    /* ── Phase label ───────────────────────────────────────────────────── */
    .phase {
      font-size: clamp(1rem, 2.8vw, 1.5rem);
      font-weight: 500;
      letter-spacing: 0.06em;
      min-height: 1.6em;
      text-transform: uppercase;
    }

    /* ── Controls ──────────────────────────────────────────────────────── */
    .controls {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.6rem;
    }

    button {
      background: rgba(255, 255, 255, 0.2);
      color: white;
      border: none;
      padding: 0.9rem 0;
      width: clamp(180px, 20vw, 260px);
      border-radius: 18px;
      font-size: clamp(1rem, 1.8vw, 1.15rem);
      font-weight: 700;
      cursor: pointer;
      transition: background 0.25s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    button:hover  { background: rgba(255, 255, 255, 0.28); }
    button:active { transform: scale(0.97); }

    .cycles-label {
      font-size: clamp(0.75rem, 1.5vw, 0.85rem);
      opacity: 0.5;
    }

    /* ── Compact layout for landscape phones (e.g. iPhone SE landscape) ── */
    @media (orientation: landscape) and (max-height: 500px) {
      .card { gap: 0.5rem; }
      .breather {
        width:  clamp(140px, 62vh, 300px);
        height: clamp(140px, 62vh, 300px);
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Breathe</h1>
    <p class="subtitle">Box breathing · 4 phases · 5 s each</p>

    <div class="breather">
      <div class="square"></div>
      <div class="dot"  id="dot"></div>
      <div class="circle" id="circle"></div>
    </div>

    <div class="phase" id="phase">Ready</div>

    <div class="controls">
      <button id="btn">Start</button>
      <div class="cycles-label" id="cycles-label"></div>
    </div>
  </div>

  <script>
    const PHASE_MS     = 5000;
    const TOTAL_CYCLES = 4;

    const body   = document.body;
    const dot    = document.getElementById('dot');
    const circle = document.getElementById('circle');
    const phase  = document.getElementById('phase');
    const btn    = document.getElementById('btn');
    const label  = document.getElementById('cycles-label');

    let running  = false;
    let timeouts = [];

    function clear() { timeouts.forEach(clearTimeout); timeouts = []; }

    function after(ms, fn) { timeouts.push(setTimeout(fn, ms)); }

    function setPhase(text, isHold) {
      phase.textContent = text;
      body.classList.toggle('hold', isHold);
      document.documentElement.classList.toggle('hold', isHold);
      circle.classList.toggle('hold', isHold);
    }

    function runCycle(n) {
      if (n > TOTAL_CYCLES) { finish(); return; }

      label.textContent = `Cycle ${n} of ${TOTAL_CYCLES}`;

      setPhase('Breathe In', false);
      circle.style.transform = 'scale(2.15)';

      after(PHASE_MS, () => {
        setPhase('Hold', true);
        after(PHASE_MS, () => {
          setPhase('Breathe Out', false);
          circle.style.transform = 'scale(1)';
          after(PHASE_MS, () => {
            setPhase('Hold', true);
            after(PHASE_MS, () => runCycle(n + 1));
          });
        });
      });
    }

    function start() {
      running = true;
      btn.textContent = 'Stop';
      dot.classList.add('running');
      runCycle(1);
    }

    function stop() {
      running = false;
      clear();
      dot.classList.remove('running');
      circle.style.transform = 'scale(1)';
      setPhase('Ready', false);
      label.textContent = '';
      btn.textContent = 'Start';
    }

    function finish() {
      running = false;
      dot.classList.remove('running');
      circle.style.transform = 'scale(1)';
      setPhase('Well done ♥', false);
      label.textContent = `${TOTAL_CYCLES} cycles complete`;
      btn.textContent = 'Again';
    }

    btn.addEventListener('click', () => running ? stop() : (stop(), start()));
  </script>
</body>
</html>
