<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#3f51b5">
  <title>Breathe</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-a: #5c6bc0;
      --bg-b: #3f51b5;
      --hold-a: #303f9f;
      --hold-b: #1a237e;
      --duration: 5s;
    }

    /* Single gradient on html — body is transparent so there's no seam */
    html {
      min-height: 100%;
      background: linear-gradient(135deg, var(--bg-a), var(--bg-b));
      transition: background 1.5s ease-in-out;
      overflow: hidden;
    }
    html.hold { background: linear-gradient(135deg, var(--hold-a), var(--hold-b)); }

    body {
      min-height: 100dvh;
      min-height: -webkit-fill-available;
      overflow: hidden;
      overscroll-behavior: none;
      touch-action: manipulation;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: clamp(1.5rem, 4vh, 3rem) 1.5rem;
      padding-bottom: max(env(safe-area-inset-bottom), clamp(1.5rem, 4vh, 3rem));
      background: transparent;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: white;
    }

    /* ── Card ──────────────────────────────────────────────────────────────
       gap:0 here — spacing is handled by margins on each child so the
       header gap can be animated to zero alongside the height collapse.     */
    .card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      padding: clamp(2rem, 5vw, 3rem) clamp(1.5rem, 4vw, 2.5rem);
      border-radius: 32px;
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.18);
      width: min(440px, 92vw);
      text-align: center;
      user-select: none;
    }

    @media (min-width: 640px) {
      .card {
        background: none;
        border: none;
        backdrop-filter: none;
        -webkit-backdrop-filter: none;
        box-shadow: none;
        padding: 0;
        width: auto;
      }
    }

    /* ── Header — collapses cleanly when breathing starts ──────────────────
       grid-template-rows: 1fr → 0fr is the only CSS technique that
       animates height from "exactly the content height" to zero, with no
       max-height approximation artefacts. margin-bottom is animated in
       sync so the flex gap below also disappears.                           */
    .header {
      display: grid;
      grid-template-rows: 1fr;
      overflow: hidden;
      width: 100%;
      margin-bottom: clamp(0.9rem, 2.5vw, 1.5rem);
      opacity: 1;
      transition: grid-template-rows 0.65s ease,
                  margin-bottom      0.65s ease,
                  opacity            0.55s ease;
    }
    .header > div {
      min-height: 0;          /* required: lets the row shrink below content */
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.35rem;
    }
    @media (min-width: 640px) {
      .header { margin-bottom: clamp(1.4rem, 3vh, 2.5rem); }
    }

    /* When running: collapse height + gap, fade out */
    .card.running .header {
      grid-template-rows: 0fr;
      margin-bottom: 0;
      opacity: 0;
    }

    /* ── Typography ────────────────────────────────────────────────────── */
    h1 {
      font-size: clamp(1.8rem, 4vw, 3rem);
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .subtitle {
      font-size: clamp(0.85rem, 1.8vw, 1.05rem);
      opacity: 0.65;
    }

    /* ── Breathing visual ─────────────────────────────────────────────── */
    .breather {
      position: relative;
      width:  clamp(260px, 55vmin, 520px);
      height: clamp(260px, 55vmin, 520px);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: visible;
      margin-bottom: clamp(0.9rem, 2.5vw, 1.5rem);
    }
    @media (min-width: 640px) {
      .breather { margin-bottom: clamp(1.4rem, 3vh, 2.5rem); }
    }

    .square {
      position: absolute;
      inset: 0;
      border: 1.5px solid rgba(255, 255, 255, 0.28);
      border-radius: 4px;
    }

    .dot {
      --ds: clamp(11px, 2.2vmin, 18px);
      position: absolute;
      width:  var(--ds);
      height: var(--ds);
      background: white;
      border-radius: 50%;
      box-shadow: 0 0 12px rgba(255, 255, 255, 0.9);
      top:  calc(var(--ds) / -2);
      left: calc(var(--ds) / -2);
      offset-path: rect(0% 100% 100% 0% round 4px);
      will-change: offset-distance;
    }

    .dot.running {
      animation: follow calc(var(--duration) * 4) linear infinite;
    }

    @keyframes follow {
      from { offset-distance:   0%; }
      to   { offset-distance: 100%; }
    }

    .circle {
      width:  44%;
      height: 44%;
      background: rgba(255, 255, 255, 0.25);
      border-radius: 50%;
      transition: transform var(--duration) cubic-bezier(0.4, 0, 0.2, 1),
                  background 1.5s ease;
      will-change: transform;
    }
    .circle.hold { background: rgba(26, 35, 126, 0.55); }

    /* ── Phase label ───────────────────────────────────────────────────── */
    .phase {
      font-size: clamp(1rem, 2.8vw, 1.5rem);
      font-weight: 500;
      letter-spacing: 0.02em;
      min-height: 1.6em;
      margin-bottom: 0.4rem;
    }

    /* ── Cycles counter ────────────────────────────────────────────────── */
    .cycles-label {
      font-size: clamp(0.75rem, 1.5vw, 0.85rem);
      opacity: 0.5;
      min-height: 1.2em;
    }

    /* ── Breather is the tap target ────────────────────────────────────── */
    .breather { -webkit-tap-highlight-color: transparent; }

    /* ── In-circle icons ───────────────────────────────────────────────── */
    .breather-icon {
      position: absolute;
      pointer-events: none;
      transition: opacity 0.35s ease;
    }

    /* Play — visible at rest, fades out when session starts */
    .play-icon {
      width:   clamp(22px, 5vmin, 42px);
      height:  clamp(22px, 5vmin, 42px);
      opacity: 0.8;
      /* Triangles look left-shifted geometrically; nudge right to optically centre */
      transform: translateX(8%);
    }
    .card.running .play-icon { opacity: 0; }

    /* Stop — hidden by default, appears on hover when running (desktop only) */
    .stop-icon {
      width:   clamp(18px, 4vmin, 34px);
      height:  clamp(18px, 4vmin, 34px);
      opacity: 0;
    }

    /* Desktop: pointer cursor + subtle glow on hover */
    @media (hover: hover) {
      .breather { cursor: pointer; }

      /* Idle hover: brighten the visual */
      .breather:hover .square {
        border-color: rgba(255, 255, 255, 0.55);
        transition: border-color 0.3s ease;
      }
      .breather:hover .circle:not(.hold) {
        background: rgba(255, 255, 255, 0.35);
      }

      /* Running hover: reveal stop icon */
      .card.running .breather:hover .stop-icon { opacity: 0.82; }
      /* Slightly dim circle so stop icon reads clearly */
      .card.running .breather:hover .circle { opacity: 0.75; }
    }

    /* Press feedback */
    .breather:active .circle { opacity: 0.6; }

    /* ── Compact landscape phones ──────────────────────────────────────── */
    @media (orientation: landscape) and (max-height: 500px) {
      .card { gap: 0.5rem; }
      .breather {
        width:  clamp(140px, 62vh, 300px);
        height: clamp(140px, 62vh, 300px);
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="header"><div>
      <h1>Breathe</h1>
      <p class="subtitle">Box breathing · 4 phases · 5 s each</p>
    </div></div>

    <div class="breather" id="breather" role="button" tabindex="0" aria-label="Start breathing">
      <div class="square"></div>
      <div class="dot"  id="dot"></div>
      <div class="circle" id="circle"></div>
      <!-- Play: visible at rest -->
      <svg class="breather-icon play-icon" viewBox="0 0 24 24" fill="white" aria-hidden="true">
        <path d="M8 5.14v14l11-7-11-7z"/>
      </svg>
      <!-- Stop: appears on hover while running (desktop) -->
      <svg class="breather-icon stop-icon" viewBox="0 0 24 24" fill="white" aria-hidden="true">
        <rect x="5" y="5" width="14" height="14" rx="3"/>
      </svg>
    </div>

    <div class="phase" id="phase">Ready</div>
    <div class="cycles-label" id="cycles-label"></div>
  </div>

  <script>
    const PHASE_MS     = 5000;
    const TOTAL_CYCLES = 4;

    const htmlEl   = document.documentElement;
    const card     = document.querySelector('.card');
    const breather = document.getElementById('breather');
    const dot      = document.getElementById('dot');
    const circle   = document.getElementById('circle');
    const phase    = document.getElementById('phase');
    const label    = document.getElementById('cycles-label');

    let running  = false;
    let timeouts = [];

    function clear() { timeouts.forEach(clearTimeout); timeouts = []; }
    function after(ms, fn) { timeouts.push(setTimeout(fn, ms)); }

    function setPhase(text, isHold) {
      phase.textContent = text;
      htmlEl.classList.toggle('hold', isHold);
      circle.classList.toggle('hold', isHold);
    }

    function runCycle(n) {
      if (n > TOTAL_CYCLES) { finish(); return; }
      label.textContent = `Cycle ${n} of ${TOTAL_CYCLES}`;
      setPhase('Breathe in', false);
      circle.style.transform = 'scale(2.15)';
      after(PHASE_MS, () => {
        setPhase('Hold', true);
        after(PHASE_MS, () => {
          setPhase('Breathe out', false);
          circle.style.transform = 'scale(1)';
          after(PHASE_MS, () => {
            setPhase('Hold', true);
            after(PHASE_MS, () => runCycle(n + 1));
          });
        });
      });
    }

    function start() {
      running = true;
      breather.setAttribute('aria-label', 'Stop breathing');
      card.classList.add('running');
      dot.classList.add('running');
      runCycle(1);
    }

    function stop() {
      running = false;
      clear();
      breather.setAttribute('aria-label', 'Start breathing');
      card.classList.remove('running');
      dot.classList.remove('running');
      circle.style.transform = 'scale(1)';
      setPhase('Ready', false);
      label.textContent = '';
    }

    function finish() {
      running = false;
      breather.setAttribute('aria-label', 'Start again');
      card.classList.remove('running');
      dot.classList.remove('running');
      circle.style.transform = 'scale(1)';
      setPhase('Well done ♥', false);
      label.textContent = `${TOTAL_CYCLES} cycles complete`;
    }

    // Click / tap anywhere on the breather to start or stop
    breather.addEventListener('click', () => running ? stop() : (stop(), start()));

    // Keyboard support (Space / Enter) for accessibility
    breather.addEventListener('keydown', e => {
      if (e.key === ' ' || e.key === 'Enter') {
        e.preventDefault();
        running ? stop() : (stop(), start());
      }
    });
  </script>
</body>
</html>
