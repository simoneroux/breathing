<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#3f51b5">
  <title>Breathe</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="manifest" href="manifest.webmanifest">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-a: #5c6bc0;
      --bg-b: #3f51b5;
      --hold-a: #303f9f;
      --hold-b: #1a237e;
      --duration: 5s;
    }

    /* Solid color on html only. iOS paints safe areas & overscroll with
       the page's background-COLOR — never background-IMAGES — so this is
       the fallback that keeps those regions indigo instead of white.      */
    html {
      height: 100%;
      background-color: var(--bg-b);
      transition: background-color 1.5s ease-in-out;
      overflow: hidden;
    }
    html.hold { background-color: var(--hold-b); }

    /* The gradient lives on fixed pseudo-layers that overshoot the layout
       viewport by the safe-area insets, so one continuous gradient covers
       the physical screen — status bar to home indicator — with no band
       of mismatched color at either end. Two layers because gradients
       can't interpolate: the hold gradient sits on top and crossfades in
       via opacity, which also makes the hold transition genuinely smooth. */
    body::before,
    body::after {
      content: '';
      position: fixed;
      top:    calc(-1 * env(safe-area-inset-top,    0px));
      right:  calc(-1 * env(safe-area-inset-right,  0px));
      bottom: calc(-1 * env(safe-area-inset-bottom, 0px));
      left:   calc(-1 * env(safe-area-inset-left,   0px));
      z-index: -1;
      pointer-events: none;
    }
    body::before {
      background: linear-gradient(135deg, var(--bg-a), var(--bg-b));
    }
    body::after {
      background: linear-gradient(135deg, var(--hold-a), var(--hold-b));
      opacity: 0;
      transition: opacity 1.5s ease-in-out;
    }
    html.hold body::after { opacity: 1; }

    /* position:fixed pins the body to the visual viewport — it can never
       scroll, bounce, or expose anything beneath it.
       Padding is deliberately symmetric WITHOUT safe-area insets: the
       notch inset (~59px) is bigger than the home-indicator inset (~34px),
       so adding them to the padding shifted the centered content downward.
       Everything is centered, nothing sits near an edge, so the insets
       aren't needed for overlap protection.                                 */
    body {
      position: fixed;
      inset: 0;
      overflow: hidden;
      overscroll-behavior: none;
      touch-action: manipulation;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: clamp(1rem, 3vh, 2.5rem) 1.25rem;
      background: transparent;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      -webkit-font-smoothing: antialiased;
      color: white;
    }

    /* ── Card — plain layout container, no chrome on any screen ───────────
       gap:0 here — spacing is handled by margins on each child so the
       header gap can be animated to zero alongside the height collapse.     */
    .card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      max-height: 100%;
      text-align: center;
      user-select: none;
      -webkit-user-select: none;
    }

    /* ── Header — collapses cleanly when breathing starts ──────────────────
       grid-template-rows: 1fr → 0fr animates height from exactly the
       content height to zero. margin-bottom is animated in sync so the
       gap below also disappears.                                            */
    .header {
      display: grid;
      grid-template-rows: 1fr;
      overflow: hidden;
      width: 100%;
      margin-bottom: clamp(0.9rem, 2.5vw, 1.5rem);
      opacity: 1;
      transition: grid-template-rows 0.65s ease,
                  margin-bottom      0.65s ease,
                  opacity            0.55s ease;
    }
    .header > div {
      min-height: 0;          /* required: lets the row shrink below content */
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.35rem;
    }
    @media (min-width: 640px) {
      .header { margin-bottom: clamp(1.4rem, 3vh, 2.5rem); }
    }

    .card.running .header {
      grid-template-rows: 0fr;
      margin-bottom: 0;
      opacity: 0;
    }

    /* ── Typography ────────────────────────────────────────────────────── */
    h1 {
      font-size: clamp(1.8rem, 4vw, 3rem);
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .subtitle {
      font-size: clamp(0.85rem, 1.8vw, 1.05rem);
      opacity: 0.65;
    }

    /* ── Stage — the square is the centering anchor ──────────────────────
       The phase + cycle labels hang below it with absolute positioning,
       so they add no height to the centered flex block. When the header
       collapses during a session, the square lands on the exact visual
       center of the screen.                                                */
    .stage { position: relative; }

    .captions {
      position: absolute;
      top: calc(100% + clamp(0.9rem, 2.5vw, 1.4rem));
      left: 50%;
      transform: translateX(-50%);
      width: max-content;
      max-width: 90vw;
      display: flex;
      flex-direction: column;
      align-items: center;
      pointer-events: none;
    }

    /* ── Breathing visual ─────────────────────────────────────────────── */
    .breather {
      position: relative;
      width:  clamp(240px, 55vmin, 520px);
      height: clamp(240px, 55vmin, 520px);
      max-width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: visible;
      -webkit-tap-highlight-color: transparent;
      outline: none;
    }

    /* Soft ambient glow behind the visual — adds depth without noise */
    .breather::before {
      content: '';
      position: absolute;
      inset: -12%;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.10) 0%, transparent 65%);
      pointer-events: none;
    }

    /* Keyboard focus ring (only for keyboard users) */
    .breather:focus-visible .square {
      border-color: rgba(255, 255, 255, 0.7);
      box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.25);
    }

    .square {
      position: absolute;
      inset: 0;
      border: 1.5px solid rgba(255, 255, 255, 0.28);
      border-radius: 4px;
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
    }

    .dot {
      --ds: clamp(11px, 2.2vmin, 18px);
      position: absolute;
      width:  var(--ds);
      height: var(--ds);
      background: white;
      border-radius: 50%;
      box-shadow: 0 0 12px rgba(255, 255, 255, 0.9);
      top:  calc(var(--ds) / -2);
      left: calc(var(--ds) / -2);
      offset-path: rect(0% 100% 100% 0% round 4px);
      will-change: offset-distance;
      opacity: 0.45;
      transition: opacity 0.6s ease;
    }
    .dot.running {
      opacity: 1;
      animation: follow calc(var(--duration) * 4) linear infinite;
    }

    @keyframes follow {
      from { offset-distance:   0%; }
      to   { offset-distance: 100%; }
    }

    .circle {
      width:  44%;
      height: 44%;
      background: rgba(255, 255, 255, 0.25);
      border-radius: 50%;
      transition: transform var(--duration) cubic-bezier(0.4, 0, 0.2, 1),
                  background 1.5s ease,
                  opacity 0.25s ease;
      will-change: transform;
    }
    .circle.hold { background: rgba(26, 35, 126, 0.55); }

    /* Gentle idle pulse — the circle "breathes" softly at rest, hinting
       at what a tap will do. Animation wins over the inline transform
       while applied; it stops the moment the session starts.               */
    .card:not(.running) .circle {
      animation: idlePulse 4.5s ease-in-out infinite;
    }
    @keyframes idlePulse {
      0%, 100% { transform: scale(1); }
      50%      { transform: scale(1.06); }
    }

    /* ── In-circle icons ───────────────────────────────────────────────── */
    .breather-icon {
      position: absolute;
      pointer-events: none;
      transition: opacity 0.35s ease;
      filter: drop-shadow(0 1px 6px rgba(0, 0, 0, 0.15));
    }

    .play-icon {
      width:   clamp(22px, 5vmin, 42px);
      height:  clamp(22px, 5vmin, 42px);
      opacity: 0.85;
      /* Triangles read left-shifted; nudge right to optically centre */
      transform: translateX(8%);
    }
    .card.running .play-icon { opacity: 0; }

    .stop-icon {
      width:   clamp(18px, 4vmin, 34px);
      height:  clamp(18px, 4vmin, 34px);
      opacity: 0;
    }

    /* Desktop hover affordances */
    @media (hover: hover) {
      .breather { cursor: pointer; }

      .breather:hover .square {
        border-color: rgba(255, 255, 255, 0.55);
      }
      .card:not(.running) .breather:hover .circle {
        background: rgba(255, 255, 255, 0.35);
      }

      .card.running .breather:hover .stop-icon { opacity: 0.82; }
      .card.running .breather:hover .circle    { opacity: 0.75; }
    }

    /* Press feedback */
    .breather:active .circle { opacity: 0.6; }

    /* ── Phase label — crossfades on change ────────────────────────────── */
    .phase {
      font-size: clamp(1rem, 2.8vw, 1.5rem);
      font-weight: 500;
      letter-spacing: 0.02em;
      min-height: 1.6em;
      margin-bottom: 0.4rem;
    }
    .phase.swap { animation: phaseIn 0.6s ease; }
    @keyframes phaseIn {
      from { opacity: 0; transform: translateY(5px); }
      to   { opacity: 1; transform: none; }
    }

    /* ── Cycles counter ────────────────────────────────────────────────── */
    .cycles-label {
      font-size: clamp(0.75rem, 1.5vw, 0.85rem);
      opacity: 0.5;
      min-height: 1.2em;
      font-variant-numeric: tabular-nums;
    }

    /* ── Compact landscape phones ──────────────────────────────────────── */
    @media (orientation: landscape) and (max-height: 500px) {
      .breather {
        width:  clamp(140px, 58vh, 300px);
        height: clamp(140px, 58vh, 300px);
      }
      .header { margin-bottom: 0.5rem; }
      .captions { top: calc(100% + 0.5rem); }
    }

    /* ── Reduced motion: keep the breathing cue, drop the décor ────────── */
    @media (prefers-reduced-motion: reduce) {
      .card:not(.running) .circle { animation: none; }
      .dot.running { animation-duration: calc(var(--duration) * 4); } /* keep pacing cue */
      .phase.swap { animation: none; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="header"><div>
      <h1>Breathe</h1>
      <p class="subtitle">Box breathing · 4 phases · 5 s each</p>
    </div></div>

    <div class="stage">
      <div class="breather" id="breather" role="button" tabindex="0" aria-label="Start breathing">
        <div class="square"></div>
        <div class="dot"  id="dot"></div>
        <div class="circle" id="circle"></div>
        <svg class="breather-icon play-icon" viewBox="0 0 24 24" fill="white" aria-hidden="true">
          <path d="M8 5.14v14l11-7-11-7z"/>
        </svg>
        <svg class="breather-icon stop-icon" viewBox="0 0 24 24" fill="white" aria-hidden="true">
          <rect x="5" y="5" width="14" height="14" rx="3"/>
        </svg>
      </div>

      <div class="captions">
        <div class="phase" id="phase" aria-live="polite">Ready</div>
        <div class="cycles-label" id="cycles-label"></div>
      </div>
    </div>
  </div>

  <script>
    const PHASE_MS     = 5000;
    const TOTAL_CYCLES = 4;

    const htmlEl    = document.documentElement;
    const themeMeta = document.querySelector('meta[name="theme-color"]');
    const card      = document.querySelector('.card');
    const breather  = document.getElementById('breather');
    const dot       = document.getElementById('dot');
    const circle    = document.getElementById('circle');
    const phase     = document.getElementById('phase');
    const label     = document.getElementById('cycles-label');

    let running  = false;
    let timeouts = [];

    function clear() { timeouts.forEach(clearTimeout); timeouts = []; }
    function after(ms, fn) { timeouts.push(setTimeout(fn, ms)); }

    function setPhase(text, isHold) {
      phase.textContent = text;
      // restart the crossfade animation
      phase.classList.remove('swap');
      void phase.offsetWidth;
      phase.classList.add('swap');

      htmlEl.classList.toggle('hold', isHold);
      circle.classList.toggle('hold', isHold);
      // keep the iOS/Android status bar tint in step with the gradient
      themeMeta.content = isHold ? '#1a237e' : '#3f51b5';
    }

    // ── Screen Wake Lock — keep the display on during a session ─────────
    let wakeLock = null;
    async function acquireWakeLock() {
      try { wakeLock = await navigator.wakeLock?.request('screen'); } catch (e) {}
    }
    function releaseWakeLock() {
      wakeLock?.release().catch(() => {});
      wakeLock = null;
    }
    document.addEventListener('visibilitychange', () => {
      if (running && document.visibilityState === 'visible') acquireWakeLock();
    });

    function runCycle(n) {
      if (n > TOTAL_CYCLES) { finish(); return; }
      label.textContent = `Cycle ${n} of ${TOTAL_CYCLES}`;
      setPhase('Breathe in', false);
      circle.style.transform = 'scale(2.15)';
      after(PHASE_MS, () => {
        setPhase('Hold', true);
        after(PHASE_MS, () => {
          setPhase('Breathe out', false);
          circle.style.transform = 'scale(1)';
          after(PHASE_MS, () => {
            setPhase('Hold', true);
            after(PHASE_MS, () => runCycle(n + 1));
          });
        });
      });
    }

    function start() {
      running = true;
      breather.setAttribute('aria-label', 'Stop breathing');
      card.classList.add('running');
      dot.classList.add('running');
      acquireWakeLock();
      runCycle(1);
    }

    function stop() {
      running = false;
      clear();
      releaseWakeLock();
      breather.setAttribute('aria-label', 'Start breathing');
      card.classList.remove('running');
      dot.classList.remove('running');
      circle.style.transform = 'scale(1)';
      setPhase('Ready', false);
      label.textContent = '';
    }

    function finish() {
      running = false;
      releaseWakeLock();
      breather.setAttribute('aria-label', 'Start again');
      card.classList.remove('running');
      dot.classList.remove('running');
      circle.style.transform = 'scale(1)';
      setPhase('Well done ♥', false);
      label.textContent = `${TOTAL_CYCLES} cycles complete`;
    }

    breather.addEventListener('click', () => running ? stop() : (stop(), start()));

    breather.addEventListener('keydown', e => {
      if (e.key === ' ' || e.key === 'Enter') {
        e.preventDefault();
        running ? stop() : (stop(), start());
      }
    });
  </script>
</body>
</html>
